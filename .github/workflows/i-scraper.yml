name: i scraper

on:
  workflow_dispatch:   # Manual trigger only — you run it when you want

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h 50min — maximises time before GitHub's 6h hard limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

      - name: Sync existing downloads from drive
        run: |
          mkdir -p ibfd_downloads
          rclone sync gdrive:ibfd_downloads ./ibfd_downloads \
            --transfers=8 \
            --fast-list \
            --progress \
            || echo "Folder empty or first run — continuing"

      - name: Patch script for headless mode
        run: |
          python - <<'PYEOF'
          import re

          with open("i.py", "r") as f:
              src = f.read()

          headless_block = '''    options = webdriver.ChromeOptions()
              options.add_argument("--headless=new")
              options.add_argument("--no-sandbox")
              options.add_argument("--disable-dev-shm-usage")
              options.add_argument("--disable-gpu")
              options.add_argument("--window-size=1920,1080")
              options.add_argument("--start-maximized")'''

          src = re.sub(
              r'options = webdriver\.ChromeOptions\(\)\s*\n\s*options\.add_argument\("--start-maximized"\)',
              headless_block,
              src
          )

          with open("i.py", "w") as f:
              f.write(src)

          print("Patch applied.")
          PYEOF

      - name: Run scraper
        run: |
          python i.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Sync downloads to drive
        if: always()
        run: |
          rclone sync ./ibfd_downloads gdrive:ibfd_downloads \
            --transfers=8 \
            --fast-list \
            --progress

      - name: Summary
        if: always()
        run: |
          echo "Total files: $(ls ibfd_downloads/*.pdf 2>/dev/null | wc -l)"
